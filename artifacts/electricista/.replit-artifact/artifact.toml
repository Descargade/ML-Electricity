kind = "web"
previewPath = "/"
title = "Matías Ludovici - Electricista"
version = "1.0.0"
id = "artifacts/electricista"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21509

[services.development]
run = "pnpm --filter @workspace/electricista run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/electricista", "run", "build" ]
publicDir = "artifacts/electricista/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21509"
BASE_PATH = "/"
